name: Bug Report
description: Report something that isn't working correctly
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: theme
    attributes:
      label: Theme
      options:
        - Modern (default)
        - Editorial
        - Vintage
        - Cozy
        - Brutalist
        - Minimalist
        - N/A
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 125 on macOS 15"
    validations:
      required: false
